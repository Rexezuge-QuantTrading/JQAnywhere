name: Continuous Integration

permissions:
  contents: read

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: continuous-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Ruff
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Check Formatting
        run: ruff format --check .

      - name: Run Ruff
        run: ruff check .

  tests:
    name: Tests Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run Tests
        run: pytest

  cli-smoke:
    name: CLI Smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Validate Example Configuration
        run: jqanywhere config validate --config examples/jqanywhere.toml

      - name: List Compatibility API
        run: jqanywhere list-api

      - name: Run Doctor
        run: jqanywhere doctor --config examples/jqanywhere.toml --json

      - name: Run Example Strategy
        run: jqanywhere run --config examples/jqanywhere.toml --now 2026-05-18T09:50:00+08:00 --json

  serverless-floci-smoke:
    name: Serverless Floci Smoke
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: ap-northeast-1
      AWS_REGION: ap-northeast-1
      AWS_ENDPOINT_URL: http://localhost:4566
      JQANYWHERE_AWS_ENDPOINT_URL: http://localhost.floci.io:4566
      JQANYWHERE_DATA_PROVIDER: empty
      JQANYWHERE_DATA_STRICT_CURRENT_DATE: "false"
      LAMBDA_RUNTIME: python3.13
      LAMBDA_ARCHITECTURE: x86_64
      SERVERLESS_LICENSE_KEY: ${{ secrets.SERVERLESS_LICENSE_KEY }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install awscli

      - name: Install Serverless Dependencies
        run: npm ci

      - name: Generate Serverless Requirements
        run: |
          python - <<'PY'
          import tomllib
          from pathlib import Path

          pyproject = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          Path("requirements.txt").write_text("\n".join(pyproject["project"]["dependencies"]) + "\n", encoding="utf-8")
          PY

      - name: Start Floci
        run: |
          docker run -d --name floci \
            -p 4566:4566 \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -e FLOCI_DEFAULT_REGION=ap-northeast-1 \
            -e FLOCI_STORAGE_MODE=memory \
            -u root \
            floci/floci:latest

          for attempt in {1..60}; do
            if curl --fail --silent http://localhost:4566/_localstack/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done

          docker logs floci
          exit 1

      - name: Deploy Serverless Stack To Floci
        run: npx serverless deploy --stage local

      - name: Verify Deployed Resources
        run: |
          aws --endpoint-url http://localhost:4566 lambda list-functions
          aws --endpoint-url http://localhost:4566 dynamodb describe-table --table-name jqanywhere-state
          aws --endpoint-url http://localhost:4566 sns list-topics

      - name: Invoke Deployed Runner
        run: |
          npx serverless invoke --stage local --function runner --data '{"time":"2026-05-18T01:50:00Z"}' | tee invoke-output.json
          grep -E 'completed|skipped' invoke-output.json

      - name: Show Floci Logs On Failure
        if: failure()
        run: docker logs floci

  package:
    name: Build Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Build Backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build Package
        run: python -m build
