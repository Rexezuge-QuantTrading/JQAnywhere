service: jqanywhere

plugins:
  - serverless-localstack

provider:
  name: aws
  runtime: '${env:LAMBDA_RUNTIME, "python3.13"}'
  architecture: '${env:LAMBDA_ARCHITECTURE, "arm64"}'
  region: '${env:AWS_REGION, "ap-northeast-1"}'
  versionFunctions: false
  logRetentionInDays: '${env:LOG_RETENTION_DAYS, 14}'
  environment:
    PYTHONPATH: /var/task/src
    JQANYWHERE_CONFIG: '${env:JQANYWHERE_CONFIG, "jqanywhere.toml"}'
    JQANYWHERE_STRATEGY_PATH: '${env:JQANYWHERE_STRATEGY_PATH, "examples/simple_daily_allocation.py"}'
    JQANYWHERE_STRATEGY_ID: '${env:JQANYWHERE_STRATEGY_ID, "simple_daily_allocation"}'
    JQANYWHERE_TIMEZONE: '${env:JQANYWHERE_TIMEZONE, "Asia/Shanghai"}'
    JQANYWHERE_DATA_PROVIDER: '${env:JQANYWHERE_DATA_PROVIDER, "adata"}'
    JQANYWHERE_DATA_STRICT_CURRENT_DATE: '${env:JQANYWHERE_DATA_STRICT_CURRENT_DATE, "false"}'
    JQANYWHERE_BROKER: paper
    JQANYWHERE_PERSISTENCE: dynamodb
    JQANYWHERE_STATE_TABLE: '${self:service}-state'
    JQANYWHERE_NOTIFIER: '${env:JQANYWHERE_NOTIFIER, "sns"}'
    AWS_ENDPOINT_URL: '${env:JQANYWHERE_AWS_ENDPOINT_URL, env:AWS_ENDPOINT_URL, ""}'
    SNS_TOPIC_ARN: '${file(./serverless/notifications/${env:JQANYWHERE_NOTIFIER, "sns"}.yml):environment.SNS_TOPIC_ARN}'
    MAIL_MEOW_BASE_URL: '${file(./serverless/notifications/${env:JQANYWHERE_NOTIFIER, "sns"}.yml):environment.MAIL_MEOW_BASE_URL}'
    MAIL_MEOW_API_KEY: '${file(./serverless/notifications/${env:JQANYWHERE_NOTIFIER, "sns"}.yml):environment.MAIL_MEOW_API_KEY}'
    NOTIFICATION_EMAIL: '${file(./serverless/notifications/${env:JQANYWHERE_NOTIFIER, "sns"}.yml):environment.NOTIFICATION_EMAIL}'
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
          Resource:
            - Fn::GetAtt: [StateTable, Arn]

functions:
  runner:
    handler: src/jqanywhere/runtime/lambda_handler.run
    timeout: 900
    reservedConcurrency: '${env:LAMBDA_RESERVED_CONCURRENCY, 1}'
    events:
      - schedule: '${env:JQANYWHERE_EVENTBRIDGE_SCHEDULE, "cron(50 1 * * ? *)"}'

resources:
  - Resources:
      StateTable:
        Type: AWS::DynamoDB::Table
        Properties:
          TableName: '${self:provider.environment.JQANYWHERE_STATE_TABLE}'
          AttributeDefinitions:
            - AttributeName: id
              AttributeType: S
          KeySchema:
            - AttributeName: id
              KeyType: HASH
          BillingMode: PAY_PER_REQUEST
  - ${file(./serverless/notifications/${env:JQANYWHERE_NOTIFIER, "sns"}.yml):resources}

package:
  patterns:
    - src/**
    - examples/**
    - jqanywhere.toml
    - '!tests/**'
    - '!.venv/**'
    - '!private/**'

custom:
  pythonRequirements:
    dockerizePip: true
    slim: true
    strip: false
    useDownloadCache: true
    useStaticCache: true
  localstack:
    stages:
      - local
    host: http://localhost
    edgePort: 4566
