service: jqanywhere

plugins:
  - serverless-localstack

provider:
  name: aws
  runtime: '${env:LAMBDA_RUNTIME, "python3.13"}'
  architecture: '${env:LAMBDA_ARCHITECTURE, "arm64"}'
  region: '${env:AWS_REGION, "ap-northeast-1"}'
  versionFunctions: false
  logRetentionInDays: '${env:LOG_RETENTION_DAYS, 14}'
  environment:
    PYTHONPATH: /var/task/src
    JQANYWHERE_CONFIG: '${env:JQANYWHERE_CONFIG, "jqanywhere.toml"}'
    JQANYWHERE_STRATEGY_PATH: '${env:JQANYWHERE_STRATEGY_PATH, "examples/simple_daily_allocation.py"}'
    JQANYWHERE_STRATEGY_ID: '${env:JQANYWHERE_STRATEGY_ID, "simple_daily_allocation"}'
    JQANYWHERE_TIMEZONE: '${env:JQANYWHERE_TIMEZONE, "Asia/Shanghai"}'
    JQANYWHERE_DATA_PROVIDER: '${env:JQANYWHERE_DATA_PROVIDER, "adata"}'
    JQANYWHERE_DATA_STRICT_CURRENT_DATE: '${env:JQANYWHERE_DATA_STRICT_CURRENT_DATE, "false"}'
    JQANYWHERE_BROKER: paper
    JQANYWHERE_PERSISTENCE: dynamodb
    JQANYWHERE_STATE_TABLE: '${self:service}-state'
    JQANYWHERE_NOTIFIER: sns
    AWS_ENDPOINT_URL: '${env:JQANYWHERE_AWS_ENDPOINT_URL, env:AWS_ENDPOINT_URL, ""}'
    SNS_TOPIC_ARN:
      Ref: NotificationTopic
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
          Resource:
            - Fn::GetAtt: [StateTable, Arn]
        - Effect: Allow
          Action:
            - sns:Publish
          Resource:
            Ref: NotificationTopic

functions:
  runner:
    handler: jqanywhere.runtime.lambda_handler.run
    timeout: 900
    reservedConcurrency: '${env:LAMBDA_RESERVED_CONCURRENCY, 1}'
    events:
      - schedule: '${env:JQANYWHERE_EVENTBRIDGE_SCHEDULE, "cron(50 1 * * ? *)"}'

resources:
  Resources:
    StateTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: '${self:provider.environment.JQANYWHERE_STATE_TABLE}'
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST
    NotificationTopic:
      Type: AWS::SNS::Topic
      Properties:
        TopicName: '${self:service}-notifications'

package:
  patterns:
    - src/**
    - examples/**
    - jqanywhere.toml
    - '!tests/**'
    - '!.venv/**'
    - '!private/**'

custom:
  pythonRequirements:
    dockerizePip: true
    slim: true
    strip: false
    useDownloadCache: true
    useStaticCache: true
  localstack:
    stages:
      - local
    host: http://localhost
    edgePort: 4566
